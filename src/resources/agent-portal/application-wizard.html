<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Wizard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        max-width: 640px;
      }
      label {
        display: block;
        margin-top: 1rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body>
    <header data-test="wizard-header">
      <h1 data-test="wizard-title">Application Wizard</h1>
      <p data-test="wizard-step-indicator">
        Step 1 of 5: Licensing and Appointment
      </p>
    </header>

    <form data-test="wizard-page-one" id="wizardPageOne">
      <label for="productType">Product Type</label>
      <select id="productType" name="productType" data-test="product-type">
        <option value="">Select product</option>
        <option value="Term Life">Term Life</option>
        <option value="Whole Life">Whole Life</option>
        <option value="Index Universal Life">Index Universal Life</option>
      </select>

      <label for="applicationState">Application State</label>
      <select
        id="applicationState"
        name="applicationState"
        data-test="application-state"
      >
        <option value="">Select state</option>
        <option value="California">California</option>
        <option value="Texas">Texas</option>
        <option value="New York">New York</option>
      </select>

      <label for="agentNumber">Agent Number</label>
      <input
        id="agentNumber"
        name="agentNumber"
        type="text"
        data-test="agent-number"
        value="AG123456"
      />

      <label for="officeNumber">Office Number</label>
      <input
        id="officeNumber"
        name="officeNumber"
        type="text"
        data-test="office-number"
        value="OFF001"
      />

      <label for="hasSecondAgent">Is there a second agent on this case?</label>
      <select
        id="hasSecondAgent"
        name="hasSecondAgent"
        data-test="has-second-agent"
      >
        <option value="No">No</option>
        <option value="Yes">Yes</option>
      </select>
    </form>
  </body>
</html>
