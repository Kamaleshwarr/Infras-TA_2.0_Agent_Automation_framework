<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
      }
      button {
        padding: 0.75rem 1.25rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <header data-test="dashboard-header">
      <h1 data-test="dashboard-title">Agent Dashboard</h1>
      <p data-test="dashboard-welcome">Welcome to the Agent Portal</p>
    </header>

    <main data-test="dashboard-container">
      <button
        type="button"
        data-test="create-new-application-button"
        id="createNewApplication"
      >
        Create New Application
      </button>
    </main>

    <script>
      document
        .getElementById('createNewApplication')
        .addEventListener('click', () => {
          window.location.href = 'application-wizard.html';
        });
    </script>
  </body>
</html>
